# =============================================================================
# T3MP3ST — Nginx reverse proxy
# Terminates HTTPS on :8443, gates all traffic behind session auth,
# and proxies to T3MP3ST (Node.js) on 127.0.0.1:3333.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

server {
    listen      8443 ssl;
    server_name _;

    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate     /certs/nginx.crt;
    ssl_certificate_key /certs/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── General ────────────────────────────────────────────────────────────
    client_max_body_size 100m;

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── Internal auth sub-request (called by auth_request directive) ───────
    location = /internal/auth {
        internal;
        proxy_pass              http://127.0.0.1:3333/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        proxy_set_header        Cookie          $http_cookie;
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_connect_timeout   3s;
        proxy_read_timeout      3s;
    }

    # ── Auth endpoints — pass through without gating ───────────────────────
    location /auth/ {
        proxy_pass              http://127.0.0.1:3333;
        proxy_set_header        Host                $proxy_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   https;
        proxy_connect_timeout   5s;
        proxy_read_timeout      10s;
    }

    # ── Health & preflight — pass through for monitoring/docker ───────────
    location ~ ^/(health|api/health|api/preflight)$ {
        proxy_pass              http://127.0.0.1:3333;
        proxy_set_header        Host                $proxy_host;
        proxy_connect_timeout   5s;
        proxy_read_timeout      10s;
    }

    # ── SSE event stream — gated, no buffering, long-lived ─────────────────
    location = /api/events {
        auth_request /internal/auth;
        error_page 401 = @api_unauthorized;

        proxy_pass                  http://127.0.0.1:3333;
        proxy_http_version          1.1;
        proxy_set_header            Host                $proxy_host;
        proxy_set_header            X-Real-IP           $remote_addr;
        proxy_set_header            X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto   https;
        proxy_set_header            Connection          '';
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          86400s;
        chunked_transfer_encoding   on;
    }

    # ── API routes — gated, return JSON 401 on failure ─────────────────────
    location /api/ {
        auth_request /internal/auth;
        error_page 401 = @api_unauthorized;

        proxy_pass              http://127.0.0.1:3333;
        proxy_http_version      1.1;
        proxy_set_header        Host                $proxy_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   https;
        proxy_set_header        Upgrade             $http_upgrade;
        proxy_set_header        Connection          $connection_upgrade;
        proxy_connect_timeout   5s;
        proxy_read_timeout      300s;
    }

    # ── UI and all other routes — gated, redirect to login on failure ───────
    location / {
        auth_request /internal/auth;
        error_page 401 = @login_redirect;

        proxy_pass              http://127.0.0.1:3333;
        proxy_http_version      1.1;
        proxy_set_header        Host                $proxy_host;
        proxy_set_header        X-Real-IP           $remote_addr;
        proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto   https;
        proxy_set_header        Upgrade             $http_upgrade;
        proxy_set_header        Connection          $connection_upgrade;
        proxy_connect_timeout   5s;
        proxy_read_timeout      60s;
    }

    # ── Auth failure handlers ──────────────────────────────────────────────
    location @login_redirect {
        return 302 /auth/login;
    }

    location @api_unauthorized {
        default_type application/json;
        return 401 '{"error":"Unauthorized","login":"/auth/login"}';
    }
}
