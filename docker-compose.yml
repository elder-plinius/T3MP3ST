# =============================================================================
# TEMPEST STACK — Docker Compose
#
# Usage:
#   ./quickstart.sh          # recommended first-run
#   make build && make up    # rebuild + start
#   docker compose build && docker compose up -d
# =============================================================================

services:
  tempest-stack:
    build:
      context: .
      dockerfile: Dockerfile
    image: tempest-stack:latest
    container_name: tempest-stack
    restart: unless-stopped

    ports:
      - "${TEMPEST_HTTPS_PORT:-8443}:8443"

    volumes:
      - tempest_missions:/data/missions
      # ── Local code scan upload directory ──────────────────────────────────────
      # Drop ZIPs or folders here; they appear as scannable targets in the UI.
      # Override the host path by setting TEMPEST_UPLOADS_DIR in .env.
      - type: bind
        source: ${TEMPEST_UPLOADS_DIR:-./scan-targets}
        target: /data/uploads
        bind:
          create_host_path: true
      # ── Sidecar TLS certs (read-only) — generated by scripts/generate-certs.sh
      - type: bind
        source: ./docker/certs/cloud-sidecar.crt
        target: /certs/cloud-sidecar.crt
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./docker/certs/binary-sidecar.crt
        target: /certs/binary-sidecar.crt
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./docker/certs/sandbox-sidecar.crt
        target: /certs/sandbox-sidecar.crt
        read_only: true
        bind:
          create_host_path: false
      # ── Local agent credential mounts (read-only, host dirs only) ────────────
      # Lets T3MP3ST detect and drive local agent CLIs (Claude Code, Codex, Hermes).
      # create_host_path: false → silently skipped if the dir doesn't exist on the host.
      - type: bind
        source: ${HOME}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/.hermes
        target: /root/.hermes
        read_only: true
        bind:
          create_host_path: false

    env_file:
      - .env

    environment:
      # These are defaults — values in .env override them
      - T3MP3ST_HOST=0.0.0.0
      # Sidecar URLs — tokens come from .env (set by scripts/generate-certs.sh)
      - CLOUD_SIDECAR_URL=https://tempest-cloud:8080
      - BINARY_SIDECAR_URL=https://tempest-binary:8080
      - SANDBOX_SIDECAR_URL=https://tempest-sandbox:8080

    depends_on:
      tempest-cloud:
        condition: service_healthy
        required: false
      tempest-binary:
        condition: service_healthy
        required: false
      tempest-sandbox:
        condition: service_healthy
        required: false

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

    # ARM / Apple Silicon: uncomment the line below
    # platform: linux/arm64

  # ── Cloud security tool sidecar ───────────────────────────────────────────
  # Runs: awscli, prowler, checkov (+ optional gcloud/az — see Dockerfile)
  # Start: docker compose up -d tempest-cloud
  # Requires: run scripts/generate-certs.sh first to generate TLS certs + tokens
  tempest-cloud:
    build:
      context: ./docker/cloud-sidecar
      dockerfile: Dockerfile
    image: tempest-cloud:latest
    container_name: tempest-cloud
    restart: unless-stopped

    volumes:
      - type: bind
        source: ./docker/certs/cloud-sidecar.key
        target: /certs/key.pem
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./docker/certs/cloud-sidecar.crt
        target: /certs/cert.pem
        read_only: true
        bind:
          create_host_path: false

    env_file:
      - .env

    environment:
      - SIDECAR_TOKEN=${CLOUD_SIDECAR_TOKEN}

    expose:
      - "8080"

    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Binary analysis tool sidecar ──────────────────────────────────────────
  # Runs: strings/nm/readelf/objdump (binutils), file, xxd, radare2, yara, binwalk
  # Start: docker compose up -d tempest-binary
  # Requires: run scripts/generate-certs.sh first to generate TLS certs + tokens
  tempest-binary:
    build:
      context: ./docker/binary-sidecar
      dockerfile: Dockerfile
    image: tempest-binary:latest
    container_name: tempest-binary
    restart: unless-stopped

    volumes:
      - type: bind
        source: ./docker/certs/binary-sidecar.key
        target: /certs/key.pem
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./docker/certs/binary-sidecar.crt
        target: /certs/cert.pem
        read_only: true
        bind:
          create_host_path: false
      # Shared uploads — binary sidecar reads the files uploaded by users
      - type: bind
        source: ${TEMPEST_UPLOADS_DIR:-./scan-targets}
        target: /data/uploads
        read_only: true
        bind:
          create_host_path: true

    env_file:
      - .env

    environment:
      - SIDECAR_TOKEN=${BINARY_SIDECAR_TOKEN}
      - UPLOADS_DIR=/data/uploads

    expose:
      - "8080"

    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Dynamic sandbox execution sidecar ────────────────────────────────────
  # Runs: ELF (QEMU user-mode + strace/ltrace/gdb + LD_PRELOAD anti-debug shim)
  #       PE  (Wine64, Windows 10 Pro disguise, relay API logging)
  #       Mach-O (Qiling emulation — no macOS license required)
  # Requires: run scripts/generate-certs.sh first
  # WARNING: cap_add SYS_PTRACE + seccomp:unconfined required for strace/gdb inside container
  tempest-sandbox:
    build:
      context: ./docker/sandbox-sidecar
      dockerfile: Dockerfile
    image: tempest-sandbox:latest
    container_name: tempest-sandbox
    restart: unless-stopped

    cap_add:
      - SYS_PTRACE     # required for strace, gdb, ltrace inside container
      - NET_RAW        # required for tcpdump packet capture
      - NET_ADMIN      # required for iptables network mode switching

    security_opt:
      - seccomp:unconfined   # Docker default seccomp blocks ptrace — must disable

    volumes:
      - type: bind
        source: ./docker/certs/sandbox-sidecar.key
        target: /certs/key.pem
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./docker/certs/sandbox-sidecar.crt
        target: /certs/cert.pem
        read_only: true
        bind:
          create_host_path: false
      # Sandbox needs rw access — copies binary to /tmp/<alias> before execution
      - type: bind
        source: ${TEMPEST_UPLOADS_DIR:-./scan-targets}
        target: /data/uploads
        read_only: false
        bind:
          create_host_path: true

    env_file:
      - .env

    environment:
      - SIDECAR_TOKEN=${SANDBOX_SIDECAR_TOKEN}
      - UPLOADS_DIR=/data/uploads
      - WINEPREFIX=/opt/wine-env

    expose:
      - "8080"

    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  tempest_missions:
    driver: local
