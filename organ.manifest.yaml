schema: plinyos.organ/v1
id: t3mp3st
name: T3MP3ST
version: 0.2.1
description: Original T3MP3ST war-room dashboard upgraded with PLINY CODE routes, agent lanes, mission contracts, evidence gates, and reports
category: weapons
runtime:
  type: node
  entrypoint: npm run server
network:
  port: 3333
  healthcheck: /health
capabilities:
  provides:
    - id: operations.intake
      name: Operation Intake
      description: Convert human-readable goals into scoped adversarial mission contracts.
      risk: solar_gold
    - id: mission.family.route
      name: Mission Family Routing
      description: Route web/API, AI red-team, cloud, smart-contract, code, crypto, reverse, agent-warfare, OSINT, and reporting missions.
      risk: solar_gold
    - id: agent.lanes.assign
      name: Agent Lane Assignment
      description: Delegate bounded lanes to PLINY CODE, Codex, Claude Code, Hermes, browser, shell, local models, and humans.
      risk: solar_gold
    - id: range.control
      name: Range Control
      description: Coordinate local labs, optional CRUCIBLE validation, benchmark scenarios, and campaign receipts.
      risk: wine_red
    - id: evidence.ledger
      name: Evidence Ledger
      description: Stream findings, tool events, failures, judge notes, artifacts, and report outputs into mission ledgers.
      risk: emerald_fractal
    - id: report.generate
      name: Report Generation
      description: Produce nontechnical summaries, engineering fix plans, technical appendices, and scorecard-linked reports.
      risk: emerald_fractal
dependencies:
  infrastructure: []
  organs: [libertarium, pliny-code, judg3, s3r4ph1m, conch, p4rs3lt0ngv3, st3gg, cl4r1t4s]
integrations:
  optional: [crucible]
ui:
  type: embedded
  path: docs/index.html
  menu:
    label: T3MP3ST
    icon: storm
    category: FANGS
